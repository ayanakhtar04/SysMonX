services:
  backend:
    build:
      context: ./sysmonx-backend
      dockerfile: Dockerfile
    container_name: sysmonx-backend
    environment:
      PORT: 5000
      NODE_ENV: production
      NODE_EXPORTER_PORT: 9100
    ports:
      - "5001:5000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5001
        VITE_APP_BASE: /
    container_name: sysmonx-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
